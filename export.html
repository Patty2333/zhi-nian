<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>数据导出工具</title></head>
<body style="font-family:system-ui;padding:40px;max-width:800px;margin:auto">
<h2>📦 织念小程序 - 本地数据导出</h2>
<p>此工具将读取你本地浏览器的所有记录并上传到 Patty 账号云端。</p>
<div id="status" style="padding:15px;background:#f5f5f5;border-radius:8px;margin:15px 0;white-space:pre-wrap"></div>
<button id="btn" onclick="doExport()" style="padding:12px 30px;font-size:16px;cursor:pointer;border:none;background:#4CAF50;color:white;border-radius:8px">🚀 开始导出</button>

<script>
const API = 'http://localhost:3000'
let token = localStorage.getItem('zhiNian_token')
const s = document.getElementById('status')
const btn = document.getElementById('btn')

function log(msg) { s.textContent += msg + '\n' }

async function doExport() {
  s.textContent = ''
  btn.disabled = true
  btn.style.opacity = 0.5

  try {
    // 1. 读取本地所有数据
    const cardsKey = Object.keys(localStorage).find(k => k.includes('cards') || k.includes('Cards'))
    const linksKey = Object.keys(localStorage).find(k => k.includes('links') || k.includes('Links'))

    log('🔍 扫描 localStorage...')
    log(`找到的 keys: ${Object.keys(localStorage).filter(k=>!k.startsWith('zhiNian_')).join(', ') || '(无)'}`)

    // 尝试各种可能的key名
    let localCards = []
    let localLinks = []
    
    for (let key of Object.keys(localStorage)) {
      if (key.startsWith('zhiNian_')) continue
      try {
        const val = JSON.parse(localStorage.getItem(key))
        if (Array.isArray(val) && val.length > 0 && val[0].content) {
          localCards = val
          log(`✅ 找到卡片数据 [${key}]: ${val.length} 条`)
        }
        if (Array.isArray(val) && val.length > 0 && val[0].sourceId) {
          localLinks = val
          log(`✅ 找到关联数据 [${key}]: ${val.length} 条`)
        }
      } catch(e) {}
    }

    if (localCards.length === 0) {
      // 尝试直接用已知key
      for (let k of ['cards', 'zhiNian_cards', 'knowledgeCards', 'emotionCards', 'experienceCards', 'allCards']) {
        try {
          const v = JSON.parse(localStorage.getItem(k))
          if (Array.isArray(v)) { localCards = v; log(`从 ${k} 找到 ${v.length} 条`); break }
        } catch(e){}
      }
    }

    log(`\n📊 本地卡片总数: ${localCards.length}`)
    log(`📊 本地关联总数: ${localLinks.length}`)

    if (localCards.length === 0) {
      log('❌ 没有找到任何本地记录！')
      log('\n请确认你是在织念小程序页面上操作过的浏览器中打开此页面。')
      log('(localStorage 按域名隔离，必须在同一域名下)')
      btn.disabled = false
      return
    }

    // 显示前3条预览
    log('\n--- 数据预览（前3条）---')
    localCards.slice(0,3).forEach((c,i) => {
      log(`${i+1}. [${c.category||'?'}] ${(c.content||'').substring(0,60)}...`)
    })
    if (localCards.length > 3) log(`... 还有 ${localCards.length-3} 条`)

    // 2. 登录获取token（如果没有）
    if (!token) {
      log('\n🔑 未登录，尝试用 Patty 账号登录...')
      const loginRes = await fetch(API + '/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:'Patty', password:'Patty123456'})
      }).then(r=>r.json())
      
      if (loginRes.token) {
        token = loginRes.token
        log('✅ 登录成功！')
      } else {
        log('❌ 登录失败: ' + (loginRes.error || '未知错误'))
        btn.disabled = false
        return
      }
    }

    // 3. 上传到云端
    log('\n⬆️ 开始上传到云端...')
    const syncRes = await fetch(API + '/api/sync', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({ cards: localCards, links: localLinks })
    }).then(r=>r.json())

    if (syncRes.success !== false) {
      log(`\n✅✅✅ 上传成功！`)
      log(`卡片: ${localCards.length} 条`)
      log(`关联: ${localLinks.length} 条`)
      log(`\n现在可以打开公网链接查看数据了！`)
    } else {
      log('❌ 上传失败: ' + (syncRes.error || '未知错误'))
    }

  } catch(e) {
    log('❌ 错误: ' + e.message)
    log('\n请确保 server.js 正在运行 (node server.js)')
  }
  
  btn.disabled = false
  btn.style.opacity = 1
}
</script>
</body>
</html>
